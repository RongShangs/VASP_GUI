# VASP GUI Web — Nginx reverse proxy for production deployment
# Usage: docker-compose or standalone nginx

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 500M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 80;
        server_name _;

        # Frontend static files
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Backend API + WebSocket
        location /api/ {
            proxy_pass http://backend:1691;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket endpoints (need special proxy headers)
        location /ws/ {
            proxy_pass http://backend:1691;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;  # 24h — WebSocket stays open
            proxy_send_timeout 86400s;
        }
    }
}
